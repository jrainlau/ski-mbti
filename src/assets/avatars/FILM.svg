<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <!-- FILM 出片侠 - 粉色/珊瑚色系，拍照姿态，相机道具 -->
  <!-- 阴影 -->
  <ellipse cx="100" cy="242" rx="48" ry="7" fill="#E8D5D8" opacity="0.5"/>
  
  <!-- 雪板 -->
  <rect x="58" y="233" width="84" height="5" rx="2.5" fill="#FF69B4"/>
  <rect x="63" y="234" width="74" height="3" rx="1.5" fill="#FF85C8" opacity="0.6"/>
  
  <!-- 左腿 -->
  <polygon points="82,180 72,228 86,232 92,182" fill="#FF85C8"/>
  <!-- 右腿 - 翘起一只脚 -->
  <polygon points="108,178 118,215 132,212 118,175" fill="#FF85C8"/>
  
  <!-- 身体 - 珊瑚粉雪服 -->
  <polygon points="74,95 62,138 72,184 120,182 130,136 116,92" fill="#FF6B8A"/>
  <polygon points="74,95 62,138 96,136" fill="#FF5C7C" opacity="0.7"/>
  <polygon points="116,92 130,136 96,136" fill="#E85574" opacity="0.7"/>
  <polygon points="62,138 72,184 96,166" fill="#FF5C7C" opacity="0.5"/>
  <polygon points="130,136 120,182 96,166" fill="#E85574" opacity="0.5"/>
  
  <!-- 左臂 - 举着手机自拍 -->
  <polygon points="74,100 50,75 56,68 80,92" fill="#FF6B8A"/>
  <circle cx="53" cy="71" r="4" fill="#FFD6A5"/>
  <!-- 手机 -->
  <rect x="40" y="52" width="18" height="28" rx="3" fill="#1A1A2E"/>
  <rect x="42" y="55" width="14" height="20" rx="1" fill="#4CC9F0" opacity="0.5"/>
  <!-- 手机屏幕反光 -->
  <rect x="43" y="56" width="5" height="8" rx="1" fill="white" opacity="0.2"/>
  
  <!-- 右臂 - 摆 pose -->
  <polygon points="116,97 150,82 152,95 120,110" fill="#FF6B8A"/>
  <circle cx="151" cy="88" r="4" fill="#FFD6A5"/>
  <!-- V 手势 -->
  <line x1="154" y1="84" x2="160" y2="72" stroke="#FFD6A5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="156" y1="86" x2="166" y2="78" stroke="#FFD6A5" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- 头部 -->
  <ellipse cx="95" cy="60" rx="24" ry="26" fill="#FFD6A5"/>
  <!-- 头发 - 长发 -->
  <path d="M72 52 Q78 28 95 25 Q112 28 118 52" fill="#4A3B2E"/>
  <path d="M70 56 Q68 70 70 85" stroke="#4A3B2E" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M120 56 Q122 70 120 85" stroke="#4A3B2E" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- 发带 -->
  <rect x="70" y="48" width="50" height="5" rx="2.5" fill="#FF6B8A"/>
  
  <!-- 眼睛 - 大眼wink -->
  <ellipse cx="86" cy="60" rx="4" ry="4.5" fill="#1A1A2E"/>
  <circle cx="85" cy="59" r="1.5" fill="white"/>
  <!-- wink 眼 -->
  <path d="M100 60 Q105 56 110 60" stroke="#1A1A2E" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- 腮红 -->
  <circle cx="80" cy="66" r="4" fill="#FFB3C1" opacity="0.4"/>
  <circle cx="110" cy="66" r="4" fill="#FFB3C1" opacity="0.4"/>
  
  <!-- 嘴 - 嘟嘴 -->
  <ellipse cx="96" cy="72" rx="4" ry="3" fill="#E85574" opacity="0.6"/>
  
  <!-- 爱心装饰 -->
  <g transform="translate(160,55) scale(0.5)">
    <path d="M0 8 C0 -5 -15 -5 -15 5 C-15 15 0 25 0 25 C0 25 15 15 15 5 C15 -5 0 -5 0 8Z" fill="#FF6B8A" opacity="0.5"/>
  </g>
  <g transform="translate(32,45) scale(0.4)">
    <path d="M0 8 C0 -5 -15 -5 -15 5 C-15 15 0 25 0 25 C0 25 15 15 15 5 C15 -5 0 -5 0 8Z" fill="#FF6B8A" opacity="0.4"/>
  </g>
</svg>