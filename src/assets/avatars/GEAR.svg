<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <!-- GEAR 装备帝 - 金色/黑色系，全副武装，闪亮装备 -->
  <!-- 阴影 -->
  <ellipse cx="100" cy="242" rx="50" ry="8" fill="#E0D5C0" opacity="0.5"/>
  
  <!-- 高端雪板 -->
  <rect x="55" y="232" width="90" height="6" rx="3" fill="#1A1A2E"/>
  <rect x="60" y="233" width="80" height="4" rx="2" fill="#F7B801"/>
  <rect x="65" y="234" width="70" height="2" rx="1" fill="#FFD166" opacity="0.6"/>
  
  <!-- 左腿 - 高端雪裤 -->
  <polygon points="80,180 70,228 84,232 90,182" fill="#2D2D2D"/>
  <!-- 右腿 -->
  <polygon points="108,178 115,226 130,224 118,176" fill="#2D2D2D"/>
  
  <!-- 身体 - 顶级雪服（黑金配色） -->
  <polygon points="72,95 60,138 70,185 122,183 132,136 118,92" fill="#1A1A2E"/>
  <polygon points="72,95 60,138 95,136" fill="#2D2D3E" opacity="0.7"/>
  <polygon points="118,92 132,136 95,136" fill="#0F0F1E" opacity="0.7"/>
  <polygon points="60,138 70,185 95,168" fill="#2D2D3E" opacity="0.5"/>
  <polygon points="132,136 122,183 95,168" fill="#0F0F1E" opacity="0.5"/>
  <!-- 品牌条纹 -->
  <rect x="68" y="128" width="58" height="3" rx="1.5" fill="#F7B801" opacity="0.7"/>
  <rect x="72" y="150" width="50" height="2" rx="1" fill="#F7B801" opacity="0.4"/>
  
  <!-- 左臂 -->
  <polygon points="72,100 45,140 52,150 78,114" fill="#1A1A2E"/>
  <circle cx="48" cy="145" r="5" fill="#FFD6A5"/>
  <!-- 手上拿着标签/说明书 -->
  <rect x="32" y="138" width="15" height="10" rx="1" fill="white" opacity="0.8"/>
  <line x1="35" y1="141" x2="44" y2="141" stroke="#ccc" stroke-width="1"/>
  <line x1="35" y1="144" x2="42" y2="144" stroke="#ccc" stroke-width="1"/>
  
  <!-- 右臂 - 展示装备 -->
  <polygon points="118,97 152,120 148,132 114,112" fill="#1A1A2E"/>
  <circle cx="150" cy="126" r="5" fill="#FFD6A5"/>
  
  <!-- 头部 -->
  <ellipse cx="95" cy="58" rx="25" ry="27" fill="#FFD6A5"/>
  
  <!-- 最新款头盔 -->
  <path d="M70 52 Q75 25 95 22 Q115 25 120 52" fill="#1A1A2E"/>
  <path d="M72 52 Q78 30 95 28 Q112 30 118 52" fill="#2D2D3E"/>
  <!-- 头盔金边 -->
  <path d="M70 52 Q95 48 120 52" stroke="#F7B801" stroke-width="2" fill="none"/>
  
  <!-- 顶级护目镜 -->
  <rect x="73" y="50" width="44" height="17" rx="8.5" fill="#1A1A2E" stroke="#F7B801" stroke-width="1"/>
  <rect x="76" y="53" width="16" height="11" rx="5.5" fill="#F7B801" opacity="0.4"/>
  <rect x="96" y="53" width="16" height="11" rx="5.5" fill="#F7B801" opacity="0.4"/>
  <rect x="78" y="55" width="5" height="3" rx="1.5" fill="white" opacity="0.4"/>
  <rect x="98" y="55" width="5" height="3" rx="1.5" fill="white" opacity="0.4"/>
  
  <!-- 嘴 - 自信微笑 -->
  <path d="M87 76 Q95 82 103 76" stroke="#C1694F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- 闪光效果 -->
  <g transform="translate(140,80)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#F7B801" stroke-width="1.5" opacity="0.6"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#F7B801" stroke-width="1.5" opacity="0.6"/>
    <line x1="-4" y1="-4" x2="4" y2="4" stroke="#F7B801" stroke-width="1" opacity="0.4"/>
    <line x1="-4" y1="4" x2="4" y2="-4" stroke="#F7B801" stroke-width="1" opacity="0.4"/>
  </g>
  <g transform="translate(155,160)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#F7B801" stroke-width="1" opacity="0.4"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#F7B801" stroke-width="1" opacity="0.4"/>
  </g>
  <g transform="translate(38,95)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#F7B801" stroke-width="1" opacity="0.3"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#F7B801" stroke-width="1" opacity="0.3"/>
  </g>
</svg>