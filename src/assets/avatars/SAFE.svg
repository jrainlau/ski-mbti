<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <!-- SAFE 安全员 - 绿色/荧光黄系，全副护具 -->
  <!-- 阴影 -->
  <ellipse cx="100" cy="242" rx="48" ry="7" fill="#D5E0D0" opacity="0.5"/>
  
  <!-- 雪板 -->
  <rect x="58" y="233" width="84" height="5" rx="2.5" fill="#2D2D2D"/>
  
  <!-- 左腿 + 护膝 -->
  <polygon points="82,180 72,228 86,232 92,182" fill="#264653"/>
  <rect x="72" y="195" width="16" height="12" rx="3" fill="#2A9D8F" opacity="0.7"/>
  <!-- 右腿 + 护膝 -->
  <polygon points="108,178 115,226 130,224 118,176" fill="#264653"/>
  <rect x="115" y="193" width="16" height="12" rx="3" fill="#2A9D8F" opacity="0.7"/>
  
  <!-- 身体 - 绿色雪服 -->
  <polygon points="74,95 62,138 72,184 120,182 130,136 116,92" fill="#2A9D8F"/>
  <polygon points="74,95 62,138 96,136" fill="#259088" opacity="0.7"/>
  <polygon points="116,92 130,136 96,136" fill="#1E7A73" opacity="0.7"/>
  <polygon points="62,138 72,184 96,166" fill="#259088" opacity="0.5"/>
  <polygon points="130,136 120,182 96,166" fill="#1E7A73" opacity="0.5"/>
  
  <!-- 护甲背心 -->
  <polygon points="78,100 72,138 80,168 110,168 118,138 112,100" fill="#264653" opacity="0.6"/>
  <rect x="85" y="120" width="20" height="3" rx="1.5" fill="#E9C46A" opacity="0.5"/>
  
  <!-- 左臂 + 护腕 -->
  <polygon points="74,100 48,138 54,148 80,112" fill="#2A9D8F"/>
  <rect x="44" y="132" width="12" height="8" rx="2" fill="#264653"/>
  <circle cx="48" cy="145" r="5" fill="#FFD6A5"/>
  <line x1="44" y1="147" x2="30" y2="228" stroke="#666" stroke-width="2.5"/>
  <circle cx="30" cy="228" r="5" fill="none" stroke="#666" stroke-width="2"/>
  
  <!-- 右臂 + 护腕 -->
  <polygon points="116,97 148,130 142,140 112,108" fill="#2A9D8F"/>
  <rect x="138" y="124" width="12" height="8" rx="2" fill="#264653"/>
  <circle cx="145" cy="137" r="5" fill="#FFD6A5"/>
  <line x1="149" y1="139" x2="165" y2="228" stroke="#666" stroke-width="2.5"/>
  <circle cx="165" cy="228" r="5" fill="none" stroke="#666" stroke-width="2"/>
  
  <!-- 头盔（安全标准） -->
  <ellipse cx="95" cy="58" rx="28" ry="30" fill="#FFD6A5"/>
  <path d="M67 52 Q72 22 95 18 Q118 22 123 52" fill="#2A9D8F"/>
  <path d="M69 52 Q74 26 95 22 Q116 26 121 52" fill="#259088"/>
  <!-- 头盔通风口 -->
  <rect x="84" y="28" width="6" height="3" rx="1.5" fill="#1E7A73"/>
  <rect x="93" y="26" width="6" height="3" rx="1.5" fill="#1E7A73"/>
  <rect x="102" y="28" width="6" height="3" rx="1.5" fill="#1E7A73"/>
  
  <!-- 护目镜 -->
  <rect x="72" y="50" width="46" height="16" rx="8" fill="#264653"/>
  <rect x="75" y="53" width="17" height="10" rx="5" fill="#E9C46A" opacity="0.5"/>
  <rect x="96" y="53" width="17" height="10" rx="5" fill="#E9C46A" opacity="0.5"/>
  <rect x="77" y="55" width="5" height="3" rx="1.5" fill="white" opacity="0.3"/>
  <rect x="98" y="55" width="5" height="3" rx="1.5" fill="white" opacity="0.3"/>
  
  <!-- 嘴 - 稳重 -->
  <path d="M88 76 Q95 80 102 76" stroke="#C1694F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- 安全标志 -->
  <g transform="translate(140,70)">
    <circle cx="0" cy="0" r="12" fill="#E9C46A" opacity="0.3"/>
    <text x="-5" y="5" font-family="sans-serif" font-size="12" font-weight="bold" fill="#264653" opacity="0.6">✓</text>
  </g>
</svg>