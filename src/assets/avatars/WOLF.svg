<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <!-- WOLF 独狼 - 深灰/黑色系，独行侠氛围，耳机 -->
  <!-- 阴影 -->
  <ellipse cx="100" cy="242" rx="45" ry="7" fill="#D0D0D0" opacity="0.4"/>
  
  <!-- 雪板 -->
  <rect x="58" y="233" width="84" height="5" rx="2.5" fill="#1A1A2E"/>
  
  <!-- 左腿 -->
  <polygon points="82,180 72,228 86,232 92,182" fill="#1A1A2E"/>
  <!-- 右腿 -->
  <polygon points="108,178 115,226 130,224 118,176" fill="#1A1A2E"/>
  
  <!-- 身体 - 全黑雪服 -->
  <polygon points="74,95 62,138 72,184 120,182 130,136 116,92" fill="#2D2D2D"/>
  <polygon points="74,95 62,138 96,136" fill="#363636" opacity="0.7"/>
  <polygon points="116,92 130,136 96,136" fill="#222222" opacity="0.7"/>
  <polygon points="62,138 72,184 96,166" fill="#363636" opacity="0.5"/>
  <polygon points="130,136 120,182 96,166" fill="#222222" opacity="0.5"/>
  
  <!-- 左臂 - 自然下垂 -->
  <polygon points="74,100 52,142 58,152 80,112" fill="#2D2D2D"/>
  <circle cx="55" cy="147" r="5" fill="#2D2D2D"/>
  <line x1="51" y1="149" x2="38" y2="228" stroke="#555" stroke-width="2.5"/>
  <circle cx="38" cy="228" r="5" fill="none" stroke="#555" stroke-width="2"/>
  
  <!-- 右臂 -->
  <polygon points="116,97 145,130 140,142 112,112" fill="#2D2D2D"/>
  <circle cx="142" cy="136" r="5" fill="#2D2D2D"/>
  <line x1="146" y1="138" x2="160" y2="228" stroke="#555" stroke-width="2.5"/>
  <circle cx="160" cy="228" r="5" fill="none" stroke="#555" stroke-width="2"/>
  
  <!-- 头部 -->
  <ellipse cx="95" cy="58" rx="24" ry="26" fill="#FFD6A5"/>
  <!-- 头发 -->
  <path d="M72 50 Q78 28 95 25 Q112 28 118 50" fill="#1A1A2E"/>
  
  <!-- 面罩（遮住下半脸） -->
  <path d="M72 62 Q72 85 95 88 Q118 85 118 62" fill="#1A1A2E"/>
  
  <!-- 护目镜 -->
  <rect x="73" y="48" width="44" height="17" rx="8.5" fill="#1A1A2E"/>
  <rect x="76" y="51" width="16" height="11" rx="5.5" fill="#333" opacity="0.8"/>
  <rect x="96" y="51" width="16" height="11" rx="5.5" fill="#333" opacity="0.8"/>
  <!-- 微弱反光 -->
  <rect x="78" y="53" width="4" height="3" rx="1.5" fill="white" opacity="0.15"/>
  <rect x="98" y="53" width="4" height="3" rx="1.5" fill="white" opacity="0.15"/>
  
  <!-- 耳机 -->
  <path d="M68 48 Q65 35 70 28 Q78 20 95 18 Q112 20 120 28 Q125 35 122 48" stroke="#555" stroke-width="3" fill="none"/>
  <rect x="63" y="44" width="10" height="14" rx="4" fill="#555"/>
  <rect x="117" y="44" width="10" height="14" rx="4" fill="#555"/>
  <rect x="65" y="46" width="6" height="10" rx="3" fill="#777"/>
  <rect x="119" y="46" width="6" height="10" rx="3" fill="#777"/>
  
  <!-- 音符装饰 -->
  <g transform="translate(132,25)" opacity="0.3">
    <circle cx="0" cy="0" r="3" fill="#777"/>
    <line x1="3" y1="0" x2="3" y2="-12" stroke="#777" stroke-width="1.5"/>
    <path d="M3 -12 Q8 -14 8 -10" stroke="#777" stroke-width="1.5" fill="none"/>
  </g>
  <g transform="translate(145,38)" opacity="0.2">
    <circle cx="0" cy="0" r="2.5" fill="#777"/>
    <line x1="2.5" y1="0" x2="2.5" y2="-10" stroke="#777" stroke-width="1.2"/>
    <path d="M2.5 -10 Q7 -12 7 -8" stroke="#777" stroke-width="1.2" fill="none"/>
  </g>
</svg>