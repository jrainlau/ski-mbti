<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <!-- NOOB 永远的初学者 - 彩色/可爱系，八字脚姿态 -->
  <!-- 阴影 -->
  <ellipse cx="100" cy="245" rx="55" ry="8" fill="#E0D8E8" opacity="0.5"/>
  
  <!-- 左雪板 - 内八字 -->
  <rect x="45" y="232" width="55" height="5" rx="2.5" fill="#9B5DE5" transform="rotate(15 72 234)"/>
  <!-- 右雪板 - 内八字 -->
  <rect x="100" y="232" width="55" height="5" rx="2.5" fill="#9B5DE5" transform="rotate(-15 127 234)"/>
  
  <!-- 左腿 - 微弯抖腿 -->
  <polygon points="78,180 62,228 76,232 88,183" fill="#00BBF9"/>
  <!-- 右腿 -->
  <polygon points="105,178 120,226 135,222 115,175" fill="#00BBF9"/>
  
  <!-- 身体 - 彩色可爱雪服 -->
  <polygon points="72,98 60,140 70,185 122,183 132,138 118,95" fill="#00BBF9"/>
  <polygon points="72,98 60,140 95,138" fill="#00A5E0" opacity="0.7"/>
  <polygon points="118,95 132,138 95,138" fill="#008EC7" opacity="0.7"/>
  <polygon points="60,140 70,185 95,167" fill="#00A5E0" opacity="0.5"/>
  <polygon points="132,138 122,183 95,167" fill="#008EC7" opacity="0.5"/>
  
  <!-- 可爱图案（雪花） -->
  <circle cx="95" cy="135" r="8" fill="white" opacity="0.2"/>
  <line x1="95" y1="128" x2="95" y2="142" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="88" y1="135" x2="102" y2="135" stroke="white" stroke-width="1.5" opacity="0.3"/>
  
  <!-- 左臂 - 张开平衡 -->
  <polygon points="72,103 38,120 42,132 78,118" fill="#00BBF9"/>
  <circle cx="40" cy="126" r="5" fill="#FFD6A5"/>
  
  <!-- 右臂 - 张开平衡 -->
  <polygon points="118,100 155,115 152,128 114,115" fill="#00BBF9"/>
  <circle cx="153" cy="121" r="5" fill="#FFD6A5"/>
  
  <!-- 头部 - 圆脸 -->
  <ellipse cx="95" cy="60" rx="26" ry="28" fill="#FFD6A5"/>
  <!-- 头发 -->
  <path d="M70 52 Q78 28 95 25 Q112 28 120 52" fill="#4A3B2E"/>
  
  <!-- 卡通头盔 -->
  <path d="M67 50 Q72 25 95 20 Q118 25 123 50" fill="#9B5DE5"/>
  <path d="M69 50 Q74 30 95 26 Q116 30 121 50" fill="#8B4DD5"/>
  
  <!-- 头盔上的小星星贴纸 -->
  <polygon points="108,32 110,38 116,38 111,42 113,48 108,44 103,48 105,42 100,38 106,38" fill="#FFD166" opacity="0.6" transform="scale(0.6) translate(72,20)"/>
  
  <!-- 眼睛 - 大圆眼惊恐 -->
  <circle cx="85" cy="58" r="5" fill="white"/>
  <circle cx="85" cy="59" r="3.5" fill="#1A1A2E"/>
  <circle cx="84" cy="58" r="1.2" fill="white"/>
  <circle cx="105" cy="58" r="5" fill="white"/>
  <circle cx="105" cy="59" r="3.5" fill="#1A1A2E"/>
  <circle cx="104" cy="58" r="1.2" fill="white"/>
  
  <!-- 眉毛 - 担忧 -->
  <path d="M79 50 Q85 47 91 50" stroke="#4A3B2E" stroke-width="2" fill="none"/>
  <path d="M99 50 Q105 47 111 50" stroke="#4A3B2E" stroke-width="2" fill="none"/>
  
  <!-- 嘴 - 紧张微笑 -->
  <path d="M87 72 Q95 78 103 72" stroke="#C1694F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 汗珠 -->
  <ellipse cx="72" cy="58" rx="2.5" ry="3.5" fill="#4CC9F0" opacity="0.5"/>
  
  <!-- 问号装饰 -->
  <text x="150" y="55" font-family="sans-serif" font-size="18" font-weight="bold" fill="#9B5DE5" opacity="0.3">?</text>
  <text x="35" y="100" font-family="sans-serif" font-size="14" font-weight="bold" fill="#9B5DE5" opacity="0.2">?</text>
</svg>