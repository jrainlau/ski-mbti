<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <!-- SOCIAL 雪场交际花 - 橙色/暖色系，开朗姿态，周围有人物剪影 -->
  <!-- 阴影 -->
  <ellipse cx="100" cy="242" rx="50" ry="8" fill="#E8DDD0" opacity="0.5"/>
  
  <!-- 滑雪板 -->
  <rect x="58" y="233" width="84" height="5" rx="2.5" fill="#2D2D2D"/>
  
  <!-- 左腿 -->
  <polygon points="82,180 72,228 86,232 92,182" fill="#264653"/>
  <!-- 右腿 -->
  <polygon points="108,178 115,226 130,224 118,176" fill="#264653"/>
  
  <!-- 身体 - 亮橙色雪服 -->
  <polygon points="74,95 62,138 72,184 120,182 130,136 116,92" fill="#F4A261"/>
  <polygon points="74,95 62,138 96,136" fill="#E69350" opacity="0.7"/>
  <polygon points="116,92 130,136 96,136" fill="#D98440" opacity="0.7"/>
  <polygon points="62,138 72,184 96,166" fill="#E69350" opacity="0.5"/>
  <polygon points="130,136 120,182 96,166" fill="#D98440" opacity="0.5"/>
  
  <!-- 左臂 - 张开拥抱 -->
  <polygon points="74,100 35,108 38,120 78,115" fill="#F4A261"/>
  <circle cx="37" cy="114" r="5" fill="#FFD6A5"/>
  
  <!-- 右臂 - 张开拥抱 -->
  <polygon points="116,97 158,105 156,118 112,112" fill="#F4A261"/>
  <circle cx="157" cy="111" r="5" fill="#FFD6A5"/>
  
  <!-- 头部 -->
  <ellipse cx="95" cy="60" rx="25" ry="27" fill="#FFD6A5"/>
  <!-- 头发 -->
  <path d="M71 52 Q78 28 95 26 Q112 28 119 52" fill="#6B3A2A"/>
  <path d="M70 56 Q68 68 72 78" stroke="#6B3A2A" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M120 56 Q122 68 118 78" stroke="#6B3A2A" stroke-width="7" fill="none" stroke-linecap="round"/>
  
  <!-- 毛线帽 -->
  <path d="M68 50 Q72 30 95 26 Q118 30 122 50" fill="#F4A261"/>
  <rect x="68" y="48" width="54" height="6" rx="3" fill="#E76F51"/>
  <circle cx="95" cy="24" r="5" fill="#F4A261"/>
  
  <!-- 眼睛 - 热情大眼 -->
  <circle cx="86" cy="60" r="4" fill="#1A1A2E"/>
  <circle cx="104" cy="60" r="4" fill="#1A1A2E"/>
  <circle cx="85" cy="59" r="1.5" fill="white"/>
  <circle cx="103" cy="59" r="1.5" fill="white"/>
  
  <!-- 嘴 - 大笑 -->
  <path d="M84 72 Q95 84 106 72" stroke="#C1694F" stroke-width="2" fill="#C1694F" opacity="0.3"/>
  
  <!-- 腮红 -->
  <circle cx="78" cy="68" r="4" fill="#F4A261" opacity="0.4"/>
  <circle cx="112" cy="68" r="4" fill="#F4A261" opacity="0.4"/>
  
  <!-- 周围的人物剪影（社交感） -->
  <g opacity="0.15">
    <!-- 左侧人物 -->
    <ellipse cx="22" cy="192" rx="10" ry="12" fill="#264653"/>
    <rect x="14" y="204" width="16" height="35" rx="4" fill="#264653"/>
    <!-- 右侧人物 -->
    <ellipse cx="178" cy="188" rx="10" ry="12" fill="#264653"/>
    <rect x="170" y="200" width="16" height="35" rx="4" fill="#264653"/>
  </g>
  
  <!-- 对话气泡 -->
  <g transform="translate(138,38)">
    <rect x="0" y="0" width="32" height="20" rx="10" fill="#F4A261" opacity="0.3"/>
    <text x="6" y="14" font-family="sans-serif" font-size="10" fill="#E76F51" opacity="0.6">Hi!</text>
  </g>
  <g transform="translate(22,32)">
    <rect x="0" y="0" width="28" height="18" rx="9" fill="#F4A261" opacity="0.25"/>
    <text x="5" y="13" font-family="sans-serif" font-size="9" fill="#E76F51" opacity="0.5">嗨~</text>
  </g>
</svg>